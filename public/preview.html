<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEW IDEA EXCHANGE Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f5f3;
        --ink: #080808;
        --muted: #696969;
        --line: #d9d9d6;
        --surface: #ffffff;
        --shadow: 0 18px 54px rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, system-ui, sans-serif;
      }

      .preview-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .preview-bar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 72px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: rgba(245, 245, 243, 0.92);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand strong {
        font-family: "Space Grotesk", Inter, sans-serif;
        font-size: 20px;
        letter-spacing: 0;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .mode-switch {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .mode-switch button,
      .open-link {
        min-height: 38px;
        border: 0;
        border-radius: 6px;
        padding: 8px 13px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .mode-switch button.active,
      .open-link {
        background: #080808;
        color: #ffffff;
      }

      .stage {
        min-width: 0;
        padding: 22px;
        display: grid;
        place-items: start center;
      }

      .frame-wrap {
        width: 100%;
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .frame-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .desktop-frame {
        width: min(100%, 1440px);
        height: calc(100vh - 124px);
        min-height: 680px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .mobile-frame-shell {
        width: 430px;
        max-width: calc(100vw - 28px);
        padding: 16px;
        border-radius: 34px;
        background: #0a0a0a;
        box-shadow: var(--shadow);
      }

      .mobile-frame {
        width: 390px;
        max-width: 100%;
        height: min(844px, calc(100vh - 150px));
        min-height: 640px;
        border: 0;
        border-radius: 24px;
        background: #ffffff;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .preview-bar {
          align-items: flex-start;
          flex-direction: column;
        }

        .stage {
          padding: 14px;
        }

        .desktop-frame {
          min-height: 720px;
          height: calc(100vh - 170px);
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-bar">
        <div class="brand">
          <strong>NEW IDEA EXCHANGE</strong>
          <span>Localhost device preview</span>
        </div>
        <div class="mode-switch" aria-label="Cihaz seçimi">
          <button class="active" type="button" data-mode="desktop">Masaüstü</button>
          <button type="button" data-mode="mobile">Mobil</button>
          <a class="open-link" href="/" target="_blank" rel="noreferrer">Tam aç</a>
        </div>
      </header>

      <section class="stage">
        <div class="frame-wrap" data-view="desktop">
          <span class="frame-label">Masaüstü görünüm · 1440px'e kadar</span>
          <div class="desktop-frame">
            <iframe title="NEW IDEA EXCHANGE desktop preview" src="/?preview=desktop"></iframe>
          </div>
        </div>

        <div class="frame-wrap hidden" data-view="mobile">
          <span class="frame-label">Mobil görünüm · 390 × 844 telefon viewport</span>
          <div class="mobile-frame-shell">
            <iframe class="mobile-frame" title="NEW IDEA EXCHANGE mobile preview" src="/?preview=mobile"></iframe>
          </div>
        </div>
      </section>
    </main>

    <script>
      const buttons = [...document.querySelectorAll("[data-mode]")];
      const views = [...document.querySelectorAll("[data-view]")];

      function setMode(mode) {
        buttons.forEach(button => button.classList.toggle("active", button.dataset.mode === mode));
        views.forEach(view => view.classList.toggle("hidden", view.dataset.view !== mode));
      }

      buttons.forEach(button => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
    </script>
  </body>
</html>
